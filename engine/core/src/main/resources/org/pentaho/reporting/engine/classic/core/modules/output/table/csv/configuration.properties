#
# CSV Table target specific configuration properties
#

# Separator: Character used to separate columns in CSV output (default: comma for standard CSV compatibility)
org.pentaho.reporting.engine.classic.core.modules.output.table.csv.Separator=,
# Enclosure: Character used to enclose field values, protecting special characters and delimiters
# (default: double-quote for standard CSV compatibility)
org.pentaho.reporting.engine.classic.core.modules.output.table.csv.Enclosure="
# ForceEnclosure: When enabled (true), all string values are enclosed, regardless of content
# When disabled (false), only values containing special characters are enclosed (default: false)
org.pentaho.reporting.engine.classic.core.modules.output.table.csv.ForceEnclosure=false

